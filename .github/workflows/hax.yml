name: Hax Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run hax.js
        env:
          hax_data: ${{ secrets.HAX_DATA }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_WARN_DAYS: "10"
        run: node hax.js
